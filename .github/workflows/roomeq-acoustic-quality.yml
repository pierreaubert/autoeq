name: RoomEQ acoustic quality

on:
  pull_request:
    paths:
      - "src/roomeq/**"
      - "src/bin/roomeq_qa_acoustic.rs"
      - "data_tests/roomeq/**"
      - "scripts/mdat2csv.py"
      - "scripts/test_mdat2csv.py"
      - "Justfile"
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acoustic-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-mutants
      - name: REW MDAT converter contracts
        run: just qa-roomeq-mdat
      - name: PR acoustic gates and reports
        if: github.event_name == 'pull_request'
        run: just qa-roomeq-acoustic-report data_tests/roomeq/acoustic_corpus/baseline.linux-x86_64.json
      - name: Nightly acoustic gates and reports
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p target/qa
          cargo run --release --bin roomeq-qa-acoustic -- \
            --tier nightly \
            --baseline data_tests/roomeq/acoustic_corpus/baseline.linux-x86_64.json \
            --output target/qa/roomeq-acoustic.json \
            --markdown-output target/qa/roomeq-acoustic.md \
            --history target/qa/roomeq-acoustic-history.ndjson \
            --max-runtime-ms 900000 \
            --max-peak-rss-kib 4194304
      - name: RoomEQ subsystem coverage floors
        run: just qa-roomeq-subsystem-coverage
      - name: Deterministic RoomEQ mutation smoke
        run: just qa-roomeq-mutation-smoke
      - name: Upload acoustic trend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roomeq-acoustic-quality
          path: target/qa/
