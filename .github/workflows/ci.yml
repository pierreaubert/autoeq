name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-and-test:
    name: Check, Clippy and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check
        run: cargo check -p autoeq --lib --bins --tests

      - name: cargo clippy
        run: cargo clippy -p autoeq --no-deps -- -D warnings

      - name: cargo test (library)
        run: cargo test -p autoeq --lib --release

  qa-roomeq-ci:
    name: RoomEQ CI QA Gate
    runs-on: ubuntu-latest
    needs: check-and-test
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Run RoomEQ CI QA
        run: just qa-roomeq-ci

  coverage-gate:
    name: Library Unit-Test Coverage Gate (90 %)
    runs-on: ubuntu-latest
    needs: check-and-test
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Run coverage gate
        run: cargo llvm-cov --lib --summary-only --release --fail-under-lines 90
